# fly.preprod.toml — Pre-production instance for testing before release
# Deploy with: fly deploy --config fly.preprod.toml

app = 'cliq-server-preprod'
primary_region = 'ord'

[build]
  dockerfile = "src/Cliq.Server/Dockerfile"
  context = "."

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
